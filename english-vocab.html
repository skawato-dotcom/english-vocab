<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4fd;
    --ocean: #1a73e8;
    --sunshine: #fbbc04;
    --grass: #34a853;
    --coral: #ea4335;
    --lavender: #9c27b0;
    --peach: #ff7043;
    --mint: #00bcd4;
    --card-bg: #ffffff;
    --text-dark: #1a1a2e;
    --text-mid: #444;
    --shadow: rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    color: var(--text-dark);
    background-image:
      radial-gradient(circle at 10% 20%, rgba(26,115,232,0.08) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(52,168,83,0.08) 0%, transparent 50%);
  }

  header {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    color: white;
    padding: 24px 20px 28px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(26,115,232,0.4);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 60%; height: 200%;
    background: rgba(255,255,255,0.05);
    transform: rotate(-15deg);
    pointer-events: none;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 1px;
    position: relative;
  }
  header p {
    font-size: 0.95rem;
    opacity: 0.85;
    margin-top: 6px;
    position: relative;
  }

  .category-tabs {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 16px 16px 4px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .category-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 50px;
    border: 2px solid transparent;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-mid);
    box-shadow: 0 2px 8px var(--shadow);
    white-space: nowrap;
  }
  .tab-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
  .tab-btn.active {
    background: var(--ocean);
    color: white;
    border-color: var(--ocean);
  }

  .category-section {
    display: none;
    padding: 16px;
    animation: fadeIn 0.3s ease;
  }
  .category-section.visible { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--ocean);
    margin-bottom: 16px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
  }

  .word-card {
    background: white;
    border-radius: 16px;
    padding: 16px 12px 14px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 3px 10px var(--shadow);
    transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    border: 2px solid transparent;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .word-card:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 8px 24px rgba(26,115,232,0.22);
    border-color: var(--ocean);
  }
  .word-card:active { transform: scale(0.95); }

  .word-card.playing {
    border-color: var(--sunshine);
    background: linear-gradient(135deg, #fffde7, #fff9c4);
    animation: pulse 0.5s ease;
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
  }

  .word-emoji {
    font-size: 2rem;
    display: block;
    margin-bottom: 8px;
    line-height: 1;
  }

  .word-en {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--text-dark);
    display: block;
    margin-bottom: 4px;
  }

  .word-jp {
    font-size: 0.72rem;
    color: #888;
    display: block;
    line-height: 1.3;
  }

  .sound-icon {
    position: absolute;
    top: 7px; right: 9px;
    font-size: 0.75rem;
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  .word-card:hover .sound-icon { opacity: 0.7; }
  .word-card.playing .sound-icon { opacity: 1; animation: spin 0.5s linear; }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Color coding per category */
  .cat-time .word-card:hover { border-color: #1a73e8; }
  .cat-days .word-card:hover { border-color: #34a853; }
  .cat-numbers .word-card:hover { border-color: #ea4335; }
  .cat-food .word-card:hover { border-color: #ff7043; }
  .cat-animals .word-card:hover { border-color: #9c27b0; }
  .cat-colors .word-card:hover { border-color: #00bcd4; }
  .cat-body .word-card:hover { border-color: #fbbc04; }
  .cat-verbs .word-card:hover { border-color: #e91e63; }

  .number-display {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: var(--coral);
    display: block;
    margin-bottom: 4px;
    line-height: 1;
  }

  footer {
    text-align: center;
    padding: 24px;
    color: #aaa;
    font-size: 0.8rem;
  }

  @media (max-width: 400px) {
    .word-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .word-card { padding: 12px 8px 10px; }
    .word-emoji { font-size: 1.5rem; }
    .word-en { font-size: 0.85rem; }
  }
</style>
</head>

// Build tabs
const tabContainer = document.getElementById('tabs');
const sectionsContainer = document.getElementById('sections');

categories.forEach((cat, i) => {
  // Tab button
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cat.label;
  btn.onclick = () => showCategory(cat.id);
  tabContainer.appendChild(btn);

  // Section
  const section = document.createElement('div');
  section.className = 'category-section' + (i === 0 ? ' visible' : '');
  section.id = 'section-' + cat.id;

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = cat.label;
  section.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'word-grid ' + cat.cssClass;

  cat.words.forEach(w => {
    const card = document.createElement('div');
    card.className = 'word-card';
    card.innerHTML = `
      <span class="word-emoji">${w.emoji}</span>
      <span class="word-en">${w.en}</span>
      <span class="word-jp">${w.jp}</span>
      <span class="sound-icon">🔊</span>
    `;
    card.onclick = () => speak(w.en, card);
    grid.appendChild(card);
  });

  section.appendChild(grid);
  sectionsContainer.appendChild(section);
});

function showCategory(id) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', categories[i].id === id);
  });
  document.querySelectorAll('.category-section').forEach(s => {
    s.classList.toggle('visible', s.id === 'section-' + id);
  });
  // Scroll tabs into view
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// Speech synthesis
let currentUtterance = null;

function speak(text, card) {
  if (!window.speechSynthesis) {
    alert('お使いのブラウザは音声読み上げに対応していません。');
    return;
  }

  // Cancel current speech
  window.speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.pitch = 1.0;

  // Try to get an English voice
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en-') && (v.name.includes('Samantha') || v.name.includes('Karen') || v.name.includes('Daniel') || v.name.includes('Google')))
    || voices.find(v => v.lang.startsWith('en-'));
  if (enVoice) utter.voice = enVoice;

  // Visual feedback
  document.querySelectorAll('.word-card.playing').forEach(c => c.classList.remove('playing'));
  card.classList.add('playing');

  utter.onend = () => {
    card.classList.remove('playing');
  };
  utter.onerror = () => {
    card.classList.remove('playing');
  };

  window.speechSynthesis.speak(utter);
}

// Preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    window.speechSynthesis.getVoices();
  });
}
